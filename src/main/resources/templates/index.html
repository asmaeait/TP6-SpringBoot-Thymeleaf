<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Users List</title>
    <!-- Bootstrap CSS -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body class="bg-light">

<div class="container mt-5">
    <div class="card shadow-sm border-0">
        <div class="card-header bg-success text-white d-flex justify-content-between align-items-center py-3">
            <h3 class="mb-0 fw-bold">Users Directory</h3>
            <a href="/signup" class="btn btn-light btn-sm fw-semibold text-success shadow-sm">
                + Add New User
            </a>
        </div>
        <div class="card-body p-4">
            <div th:switch="${users}">
                <div th:case="null" class="alert alert-warning text-center border-0 shadow-sm">
                    No users yet! Click the button above to add one.
                </div>
                <div th:case="*">
                    <div class="table-responsive">
                        <table class="table table-hover align-middle mb-0">
                            <thead class="table-light">
                            <tr>
                                <th class="text-secondary fw-semibold">Name</th>
                                <th class="text-secondary fw-semibold">Email</th>
                                <th class="text-secondary fw-semibold text-end" style="width: 200px;">Actions</th>
                            </tr>
                            </thead>
                            <tbody class="border-top-0">
                            <tr th:each="user : ${users}">
                                <td th:text="${user.name}" class="fw-medium text-dark"></td>
                                <td th:text="${user.email}" class="text-muted"></td>
                                <td class="text-end">
                                    <a th:href="@{/edit/{id}(id=${user.id})}" class="btn btn-sm btn-outline-success me-2 px-3">Edit</a>
                                    <a th:href="@{/delete/{id}(id=${user.id})}" class="btn btn-sm btn-outline-danger px-3">Delete</a>
                                </td>
                            </tr>
                            </tbody>
                        </table>
                    </div>
                </div>
            </div>
        </div>
    </div>
</div>

<!-- Bootstrap Bundle with Popper -->
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
