<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Update User</title>
    <!-- Bootstrap CSS -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body class="bg-light">

<div class="container mt-5">
    <div class="row justify-content-center">
        <div class="col-md-6 col-lg-5">
            <div class="card shadow-sm border-0">
                <div class="card-header bg-success text-white py-3">
                    <h3 class="mb-0 fw-bold">Update User</h3>
                </div>
                <div class="card-body p-4">
                    <form action="#" th:action="@{/update/{id}(id=${user.id})}" th:object="${user}" method="post">
                        <div class="mb-4">
                            <label class="form-label fw-semibold text-secondary">Name</label>
                            <input type="text" th:field="*{name}" class="form-control form-control-lg bg-light" placeholder="Enter full name">
                            <div th:if="${#fields.hasErrors('name')}" th:errors="*{name}" class="text-danger mt-1 small"></div>
                        </div>
                        <div class="mb-4">
                            <label class="form-label fw-semibold text-secondary">Email</label>
                            <input type="email" th:field="*{email}" class="form-control form-control-lg bg-light" placeholder="Enter email address">
                            <div th:if="${#fields.hasErrors('email')}" th:errors="*{email}" class="text-danger mt-1 small"></div>
                        </div>
                        <div class="d-grid gap-2 d-md-flex justify-content-md-end mt-4">
                            <a href="/" class="btn btn-light text-secondary fw-semibold px-4 me-md-2">Cancel</a>
                            <button type="submit" class="btn btn-success fw-semibold px-4">Save Changes</button>
                        </div>
                    </form>
                </div>
            </div>
        </div>
    </div>
</div>

<!-- Bootstrap Bundle with Popper -->
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
